---
layout: default
---

<article class="post">
  <header class="post-header">
    <a class="post-source-link" href="{{ site.github_repo_url }}/blob/main/{{ page.path }}">MD Source</a>
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>

    <h1>{{ page.title }}</h1>

    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
