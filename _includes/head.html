<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
  {% if page.title %}
    {{ page.title }} | {{ site.title }}
  {% else %}
    {{ site.title }}
  {% endif %}
</title>

<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="google-site-verification" content="clCBMUwyNAviP3u7k3PWFPfXc6PLe-xu5XsoouS7xo8">

<link rel="icon" type="image/png" href="{{ '/assets/img/logo.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/img/logo.png' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
